<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorama</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        h1 {
            margin-bottom: 20px;
        }
        #memorama {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-gap: 10px;
        }
        .card {
            width: 80px;
            height: 80px;
            background: #2196f3;
            color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s, color 0.3s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .card.flipped {
            background: #fff;
            color: #2196f3;
            cursor: default;
        }
        .card.matched {
            background: #4caf50;
            color: #fff;
            cursor: default;
        }
        #back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 15px;
            border: none;
            background: #2196f3;
            color: #fff;
            border-radius: 5px;
            font-size: 1.5em;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #back-btn:hover {
            background: #1976d2;
        }
        #reset {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #2196f3;
            color: #fff;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <a href="../index.html" id="back-btn">← Atrás</a>
    <h1>Memorama</h1>
    <div id="memorama"></div>
    <button id="reset">Reiniciar</button>
    <script>
        const icons = ['🍎','🍌','🍒','🍇','🍉','🍋','🍓','🥝'];
        let cards = [];
        let firstCard = null;
        let secondCard = null;
        let lock = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function createBoard() {
            cards = [];
            const board = document.getElementById('memorama');
            board.innerHTML = '';
            let cardIcons = icons.concat(icons); // 16 cards
            shuffle(cardIcons);
            cardIcons.forEach((icon, idx) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.icon = icon;
                card.dataset.index = idx;
                card.addEventListener('click', flipCard);
                board.appendChild(card);
                cards.push(card);
            });
        }

        function flipCard(e) {
            if (lock) return;
            const card = e.currentTarget;
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
            card.classList.add('flipped');
            card.textContent = card.dataset.icon;
            if (!firstCard) {
                firstCard = card;
            } else if (!secondCard && card !== firstCard) {
                secondCard = card;
                lock = true;
                setTimeout(checkMatch, 800);
            }
        }

        function checkMatch() {
            if (firstCard.dataset.icon === secondCard.dataset.icon) {
                firstCard.classList.add('matched');
                secondCard.classList.add('matched');
            } else {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');
                firstCard.textContent = '';
                secondCard.textContent = '';
            }
            firstCard = null;
            secondCard = null;
            lock = false;
            if (cards.every(card => card.classList.contains('matched'))) {
                setTimeout(() => alert('¡Ganaste!'), 500);
            }
        }

        document.getElementById('reset').addEventListener('click', () => {
            createBoard();
        });

        createBoard();
    </script>
</body>
</html>
